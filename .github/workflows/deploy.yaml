name: Deploy App

on:
  push:
    branches:
      - "main"
    paths:
      - "k8s/**"
      - "nginx-chart/**"
      - "Dockerfile"

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: rayne-eks
  APP_NAME: app-teste

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx-app:${{ github.sha }} .

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx-app:${{ github.sha }}

  deploy:
    name: Deploy no EKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Atualizar kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Instalar Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy com Helm
        run: |
          helm upgrade --install $APP_NAME ./nginx-chart \
            --set image.repository=${{ secrets.DOCKER_USERNAME }}/nginx-app \
            --set image.tag=${{ needs.build.outputs.image_tag }}

      - name: Verificar rollout
        run: |
          kubectl rollout status deployment/$APP_NAME -n namespace-teste