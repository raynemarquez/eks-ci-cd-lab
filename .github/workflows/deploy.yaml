name: CI-CD-EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx-app:latest .

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx-app:latest

      - name: Atualizar kubeconfig
        run: |
          aws eks update-kubeconfig --name rayne-eks --region us-east-1

      - name: Deploy no Kubernetes
        run: |
          kubectl set image deployment/nginx nginx=${{ secrets.DOCKER_USERNAME }}/nginx-app:latest