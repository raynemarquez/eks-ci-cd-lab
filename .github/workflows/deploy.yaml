name: Deploy App

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: rayne-eks
  APP_NAME: app-teste

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx-app:${{ github.sha }} .

      - run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx-app:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: aws eks update-kubeconfig --name rayne-eks --region us-east-1

      - run: curl -s https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - run: |
          helm upgrade --install app-teste ./nginx-chart \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/nginx-app \
          --set image.tag=${{ needs.build.outputs.image_tag }}

      - run: kubectl rollout status deployment/app-teste -n namespace-teste