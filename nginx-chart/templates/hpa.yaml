apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-teste-hpa
  namespace: namespace-teste
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-teste
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50